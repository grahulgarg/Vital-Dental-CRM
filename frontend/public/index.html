<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Vital Dental — Patient Management System" />
    <title>Vital Dental — Clinic Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Vital Dental">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f0f4f8; -webkit-tap-highlight-color: transparent; }
      #root { height: 100vh; display: flex; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      /* Mobile touch tweaks */
      input, select, textarea, button { touch-action: manipulation; }
      /* Prevent content hidden behind bottom nav on mobile */
      @media (max-width: 767px) {
        #root { overflow: hidden; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Vital Dental.</noscript>
    <div id="root"></div>
  </body>
</html>
